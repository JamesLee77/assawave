<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0b14" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <title>ASSA WAVE — K-pop fandom, owned by fans.</title>
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://assawave.io/" />
    <meta property="og:title" content="ASSA WAVE — The new wave of K-pop fandom, owned by fans." />
    <meta property="og:description" content="A Web3 music economy for K-pop fandom. Official site: assawave.io" />
    <meta property="og:image" content="https://assawave.io/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ASSA WAVE" />
    <meta name="twitter:description" content="A Web3 music economy for K-pop fandom. Official site: assawave.io" />
    <meta name="twitter:image" content="https://assawave.io/og-image.png" />
    <meta
      name="description"
      content="ASSA WAVE — a Web3 music economy for K-pop fandom. Official site: assawave.io"
    />
    <script>
      // Theme bootstrap — runs before React mounts to prevent flash.
      // Brand default is dark; we don't fall back to prefers-color-scheme.
      (() => {
        try {
          var stored = localStorage.getItem("assawave-theme");
          if (stored === "dark" || stored === "light") {
            document.documentElement.dataset.theme = stored;
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
