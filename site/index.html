<!doctype html>
<html lang="ko" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0b14" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>ASSA WAVE · 아싸</title>
    <meta
      name="description"
      content="ASSA WAVE — K-pop 팬덤 Web3 음악 이코노미. 공식: assawave.io"
    />
    <script>
      // Theme bootstrap — runs before React mounts to prevent flash.
      // Brand default is dark; we don't fall back to prefers-color-scheme.
      (() => {
        try {
          var stored = localStorage.getItem("assawave-theme");
          if (stored === "dark" || stored === "light") {
            document.documentElement.dataset.theme = stored;
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
